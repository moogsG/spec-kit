# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch workflow strategy.
# "existing-ticket" requires developers to create/switch to a ticket branch before
# running /speckit-specify. Spec Kit validates the branch and derives spec paths
# from the ticket key plus generated spec slug.
branch_strategy: existing-ticket

# Ticket branch policy for the existing-ticket strategy.
# Branches may be either the bare ticket key (GDEV-1234) or prefixed with one
# allowed branch category (feature/GDEV-1234, fix/MSPS-1234, etc.).
ticket_pattern: "^[A-Z]+-[0-9]+$"
allowed_branch_prefixes:
  - feature
  - fix
  - hotfix
  - chore
spec_directory_format: "{ticket}-{slug}"

# Spec Kit must not create branches automatically. Branch creation is explicit only
# via dedicated Git commands or normal git CLI usage.
auto_create_branch: false

# Legacy branch numbering strategy for explicit branch-creation commands only:
# "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "[Spec Kit] Initial commit"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
auto_commit:
  default: false
  before_clarify:
    enabled: false
    message: "[Spec Kit] Save progress before clarification"
  before_plan:
    enabled: false
    message: "[Spec Kit] Save progress before planning"
  before_tasks:
    enabled: false
    message: "[Spec Kit] Save progress before task generation"
  before_implement:
    enabled: false
    message: "[Spec Kit] Save progress before implementation"
  before_checklist:
    enabled: false
    message: "[Spec Kit] Save progress before checklist"
  before_analyze:
    enabled: false
    message: "[Spec Kit] Save progress before analysis"
  before_taskstoissues:
    enabled: false
    message: "[Spec Kit] Save progress before issue sync"
  after_constitution:
    enabled: false
    message: "[Spec Kit] Add project constitution"
  after_specify:
    enabled: false
    message: "[Spec Kit] Add specification"
  after_clarify:
    enabled: false
    message: "[Spec Kit] Clarify specification"
  after_plan:
    enabled: false
    message: "[Spec Kit] Add implementation plan"
  after_tasks:
    enabled: false
    message: "[Spec Kit] Add tasks"
  after_implement:
    enabled: false
    message: "[Spec Kit] Implementation progress"
  after_checklist:
    enabled: false
    message: "[Spec Kit] Add checklist"
  after_analyze:
    enabled: false
    message: "[Spec Kit] Add analysis report"
  after_taskstoissues:
    enabled: false
    message: "[Spec Kit] Sync tasks to issues"
